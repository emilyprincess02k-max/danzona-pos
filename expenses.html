<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - SHEDS POS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <script src="api.js"></script>
    <script src="common.js"></script>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
    <div class="header">
        <h2><i class="fas fa-receipt"></i> Expenses</h2>
        <div id="userMenu"></div>
        <div class="header-clock" id="topClock"></div>
    </div>
    <div class="content">
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label"><i class="fas fa-receipt"></i> Total Expenses</div>
                <div class="kpi-value" id="totalExpenses">?0.00</div>
                <div class="kpi-sub">All recorded expenses</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label"><i class="fas fa-calendar"></i> This Month</div>
                <div class="kpi-value" id="monthlyExpenses">?0.00</div>
                <div class="kpi-sub">Current period</div>
            </div>
        </div>
        <div class="page-head">
            <div>
                <h3>Expense Management</h3>
                <p>Track and manage business expenses.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddExpenseForm()"><i class="fas fa-plus"></i> Add Expense</button>
        </div>
        <div class="panel">
            <div class="toolbar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search description..." oninput="renderExpenses()">
                <select id="categoryFilter" class="form-select" onchange="renderExpenses()">
                    <option value="all">All Categories</option>
                    <option value="utilities">Utilities</option>
                    <option value="rent">Rent</option>
                    <option value="supplies">Supplies</option>
                    <option value="payroll">Payroll</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="other">Other</option>
                </select>
                <button class="btn btn-info" onclick="exportExpensesCSV()"><i class="fas fa-file-export"></i> Export CSV</button>
                <button class="btn btn-secondary" onclick="printExpenses()"><i class="fas fa-print"></i> Print</button>
            </div>
        </div>
        <div id="addExpenseForm" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="expenseFormTitle">Add New Expense</h3>
                    <button class="modal-close" onclick="POS.closeModal('addExpenseForm')">&times;</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Date</label>
                        <input type="date" id="expenseDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="required">Category</label>
                        <select id="expenseCategory" class="form-select">
                            <option value="">Select Category</option>
                            <option value="utilities">Utilities</option>
                            <option value="rent">Rent</option>
                            <option value="supplies">Supplies</option>
                            <option value="payroll">Payroll</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label class="required">Description</label>
                        <input type="text" id="expenseDescription" class="form-control" placeholder="Enter description">
                    </div>
                    <div class="form-group">
                        <label class="required">Amount (?)</label>
                        <input type="number" id="expenseAmount" class="form-control" min="0" step="0.01" placeholder="Enter amount">
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="expensePaymentMethod" class="form-select">
                            <option value="cash">Cash</option>
                            <option value="card">Card</option>
                            <option value="transfer">Transfer</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="POS.closeModal('addExpenseForm')">Cancel</button>
                    <button class="btn btn-success" onclick="addExpense()">Save Expense</button>
                </div>
            </div>
        </div>
        <div class="table-panel">
            <div class="table-top">
                <strong><i class="fas fa-list"></i> Expense Records</strong>
                <span id="expenseCount">0 expenses</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Payment Method</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expensesTableBody">
                        <tr><td colspan="6" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
var expenses = [];
var filteredExpenses = [];
var editExpenseId = null;
var catLabels = { utilities: 'Utilities', rent: 'Rent', supplies: 'Supplies', payroll: 'Payroll', maintenance: 'Maintenance', other: 'Other' };
function showAddExpenseForm() {
    editExpenseId = null;
    $('addExpenseForm').classList.add('open');
    $('expenseFormTitle').textContent = 'Add New Expense';
    $('expenseDate').value = new Date().toISOString().split('T')[0];
    $('expenseCategory').value = '';
    $('expenseDescription').value = '';
    $('expenseAmount').value = '';
    $('expensePaymentMethod').value = 'cash';
}
function $(id) { return document.getElementById(id); }
async function addExpense() {
    var date = $id('expenseDate').value;
    var category = $id('expenseCategory').value;
    var desc = $id('expenseDescription').value.trim();
    var amount = parseFloat($id('expenseAmount').value) || 0;
    var method = $id('expensePaymentMethod').value;
    if (!date || !category || !desc || amount <= 0) {
        POS.showToast('Please fill all required fields', true);
        return;
    }
    try {
        if (editExpenseId !== null) {
            await API.updateExpense(editExpenseId, { date: date, category: category, description: desc, amount: amount, method: method });
            POS.showToast('Expense updated!');
        } else {
            var newId = expenses.length > 0 ? Math.max.apply(null, expenses.map(function(e) { return e.id; })) + 1 : 1;
            await API.saveExpense({ id: newId, date: date, category: category, description: desc, amount: amount, method: method });
            POS.showToast('Expense added successfully!');
        }
        POS.closeModal('addExpenseForm');
        renderExpenses();
    } catch (err) {
        POS.showToast(err.message || 'Failed to save expense', true);
    }
}
async function renderExpenses() {
    try {
        expenses = await API.getExpenses() || [];
    } catch (err) {
        expenses = [];
        POS.showToast('Failed to load expenses', true);
    }
    var q = $id('searchInput').value.toLowerCase();
    var cat = $id('categoryFilter').value;
    filteredExpenses = expenses.filter(function(e) {
        var matchesSearch = (e.description || '').toLowerCase().includes(q);
        var matchesCat = cat === 'all' || e.category === cat;
        return matchesSearch && matchesCat;
    });
    var tbody = $id('expensesTableBody');
    $id('expenseCount').textContent = filteredExpenses.length + ' expenses';
    var total = expenses.reduce(function(sum, e) { return sum + (parseFloat(e.amount) || 0); }, 0);
    $id('totalExpenses').textContent = POS.formatCurrency(total);
    if (!filteredExpenses.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No expenses found</td></tr>';
        return;
    }
    tbody.innerHTML = filteredExpenses.map(function(e) {
        return '<tr>' +
            '<td>' + POS.formatDate(e.date) + '</td>' +
            '<td>' + POS.esc(catLabels[e.category] || e.category) + '</td>' +
            '<td>' + POS.esc(e.description) + '</td>' +
            '<td>' + POS.formatCurrency(e.amount || 0) + '</td>' +
            '<td>' + POS.esc((e.method || '').charAt(0).toUpperCase() + (e.method || '').slice(1)) + '</td>' +
            '<td class="action-btns">' +
            '<button class="icon-btn edit" onclick="editExpense(' + e.id + ')"><i class="fas fa-edit"></i></button>' +
            '<button class="icon-btn delete" onclick="deleteExpense(' + e.id + ')"><i class="fas fa-trash"></i></button>' +
            '</td></tr>';
    }).join('');
}
function editExpense(id) {
    var exp = expenses.find(function(e) { return e.id == id; });
    if (!exp) return;
    editExpenseId = id;
    $id('expenseFormTitle').textContent = 'Edit Expense';
    $id('expenseDate').value = exp.date;
    $id('expenseCategory').value = exp.category;
    $id('expenseDescription').value = exp.description;
    $id('expenseAmount').value = exp.amount;
    $id('expensePaymentMethod').value = exp.method;
    $id('addExpenseForm').classList.add('open');
}
async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;
    try {
        await API.deleteExpense(id);
        POS.showToast('Expense deleted!');
        renderExpenses();
    } catch (err) {
        POS.showToast(err.message || 'Delete failed', true);
    }
}
function exportExpensesCSV() {
    var data = filteredExpenses.length > 0 ? filteredExpenses : expenses;
    if (!data.length) {
        POS.showToast('No expenses to export', true);
        return;
    }
    POS.exportCSV('expenses_' + POS.today() + '.csv',
        ['Date', 'Category', 'Description', 'Amount', 'Payment Method'],
        data.map(function(e) {
            return {
                Date: e.date || '',
                Category: catLabels[e.category] || e.category,
                Description: e.description || '',
                Amount: e.amount || 0,
                'Payment Method': e.method || ''
            };
        })
    );
}
function printExpenses() {
    var data = filteredExpenses.length > 0 ? filteredExpenses : expenses;
    POS.printTable('SHEDS POS Expenses Report',
        ['Date', 'Category', 'Description', 'Amount', 'Payment Method'],
        data.map(function(e) {
            return {
                Date: POS.formatDate(e.date),
                Category: catLabels[e.category] || e.category,
                Description: e.description || '',
                Amount: POS.formatCurrency(e.amount || 0),
                'Payment Method': e.method || ''
            };
        })
    );
}
document.addEventListener('DOMContentLoaded', function() {
    if (!POS.requireAuth()) return;
    POS.renderSidebar();
    POS.renderUserMenu();
    renderExpenses();
});
</script>
</body>
</html>
