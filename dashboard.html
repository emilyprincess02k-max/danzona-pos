<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - SHEDS POS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="api.js"></script>
<script src="common.js"></script>
<link rel="stylesheet" href="common.css">
<style>
.date-filter{padding:12px;background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.preset-btns{display:flex;gap:6px;}
.preset-btn{padding:7px 12px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;}
.preset-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.chart-container{background:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.chart-wrapper{position:relative;height:280px;}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="header">
<h2><i class="fas fa-chart-line"></i> Dashboard</h2>
<div id="userMenu"></div>
<div class="header-clock" id="topClock"></div>
</div>
<div class="content">
<div class="date-filter">
<label><i class="fas fa-calendar-alt"></i> Period:</label>
<input type="date" id="startDate">
<span>to</span>
<input type="date" id="endDate">
<button class="btn btn-primary" onclick="loadDashboard()"><i class="fas fa-sync-alt"></i></button>
<div class="preset-btns">
<button class="preset-btn active" onclick="setPreset('7d',this)">7D</button>
<button class="preset-btn" onclick="setPreset('30d',this)">30D</button>
<button class="preset-btn" onclick="setPreset('90d',this)">90D</button>
</div>
</div>
<div class="kpi-grid" id="kpiGrid"></div>
<div class="chart-container"><div class="chart-wrapper"><canvas id="trendChart"></canvas></div></div>
<div class="chart-container"><div class="chart-wrapper"><canvas id="categoryChart"></canvas></div></div>
<div class="chart-container"><div class="chart-wrapper"><canvas id="paymentChart"></canvas></div></div>
<div id="activityFeed" style="max-height:200px;overflow-y:auto;background:#fff;padding:16px;border-radius:16px;box-shadow:var(--shadow);"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var catChart,trendChart,payChart,sales=[],products=[],customers=[];var datePreset='7d';
function $(id){return document.getElementById(id);}
function formatCurrency(v){return '₦'+(parseFloat(v)||0).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2});}
async function loadDashboard(){
if(!POS.requireAuth())return;POS.renderSidebar();POS.renderUserMenu();POS.startClock();
var now=new Date();var start=new Date();if(datePreset==='7d')start.setDate(now.getDate()-7);else if(datePreset==='30d')start.setDate(now.getDate()-30);else if(datePreset==='90d')start.setDate(now.getDate()-90);
$('startDate').value=start.toISOString().split('T')[0];$('endDate').value=now.toISOString().split('T')[0];
try{await Promise.all([loadSales(),loadProducts(),loadCustomers()]);}catch(e){}
renderKPIs();renderCharts();renderActivity();
}
async function loadSales(){try{sales=await API.getSales()||[];}catch(e){try{sales=JSON.parse(localStorage.getItem('SHEDS_sales')||'[]');}catch(err){sales=[];}}
if(!sales.length)sales=JSON.parse(localStorage.getItem('SHEDS_completed_sales')||'[]');}
async function loadProducts(){try{products=await API.getProducts()||[];}catch(e){try{products=JSON.parse(localStorage.getItem('SHEDS_products')||'[]');}catch(err){products=[];}}
if(!products.length)products=JSON.parse(localStorage.getItem('SHEDS_inventory')||'[]');}
async function loadCustomers(){try{customers=await API.getCustomers()||[];}catch(e){try{customers=JSON.parse(localStorage.getItem('danzona_customers')||'[]');}catch(err){customers=[];}}
if(!customers.length)customers=JSON.parse(localStorage.getItem('SHEDS_customers')||'[]');}
function renderKPIs(){var totalSales=sales.reduce(function(s,x){return s+parseFloat(x.total||0);},0);var totalCost=0;
sales.forEach(function(s){(s.items||[]).forEach(function(it){var p=products.find(function(pr){return pr.id==it.id||pr.id==it.productId;});totalCost+=(p?(parseFloat(p.cost_price)||0):(parseFloat(it.cost)||0))*(parseInt(it.qty)||1);});});
var profit=totalSales-totalCost;
$('kpiGrid').innerHTML=
'<div class="kpi-card"><div class="kpi-label"><i class="fas fa-chart-line"></i> Sales Profit</div><div class="kpi-value" style="color:'+(profit>=0?'#10b981':'#ef4444')+'">'+formatCurrency(profit)+'</div></div>'+
'<div class="kpi-card"><div class="kpi-label"><i class="fas fa-shopping-cart"></i> Total Sales</div><div class="kpi-value">'+formatCurrency(totalSales)+'</div></div>'+
'<div class="kpi-card"><div class="kpi-label"><i class="fas fa-receipt"></i> Transactions</div><div class="kpi-value">'+(sales.length)+'</div></div>'+
'<div class="kpi-card"><div class="kpi-label"><i class="fas fa-users"></i> Customers</div><div class="kpi-value">'+(customers.length)+'</div></div>';
}
function setPreset(preset,el){datePreset=preset;document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');loadDashboard();}
function renderCharts(){var daily={};var days=7;if(datePreset==='30d')days=30;else if(datePreset==='90d')days=90;var now=new Date();for(var i=days-1;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);daily[d.toISOString().split('T')[0]]=0;}sales.forEach(function(s){var d=s.date?s.date.split('T')[0]:s.created_at?s.created_at.split('T')[0]:'';if(daily[d])daily[d]+=parseFloat(s.total||0);});var labels=Object.keys(daily),vals=Object.values(daily);if(trendChart)trendChart.destroy();trendChart=new Chart($('trendChart'),{type:'line',data:{labels:labels.map(function(l){return l.split('-')[1]+'/'+l.split('-')[2];}),datasets:[{data:vals,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',fill:true}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}});if(payChart)payChart.destroy();payChart=new Chart($('paymentChart'),{type:'doughnut',data:{labels:['Cash','Card'],datasets:[{data:[1,2],backgroundColor:['#10b981','#3b82f6']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});if(catChart)catChart.destroy();catChart=new Chart($('categoryChart'),{type:'bar',data:{labels:['General'],datasets:[{data:[1],backgroundColor:'#10b981'}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{beginAtZero:true}}}});}
function renderActivity(){$('activityFeed').innerHTML=sales.slice(-5).map(function(s){return '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;cursor:pointer;" onclick="viewSale('+s.id+')"><i class="fas fa-shopping-cart" style="color:#10b981;margin-right:6px;"></i>Sale #'+s.id+' - '+formatCurrency(s.total)+'<span style="float:right;font-size:11px;color:#6b7280;">'+POS.formatDate(s.date)+'</span></div>';}).join('')||'<div style="padding:20px;color:#6b7280;">No activity</div>';}
function viewSale(id){var s=sales.find(function(sal){return sal.id==id;});if(!s)return;var items=s.items&&s.items.length?s.items.map(function(it){return '<tr><td>'+(it.name||it.product||'Product')+'</td><td>'+it.qty+'</td><td>'+formatCurrency(it.price||it.total||0)+'</td><tr>';}).join(''):'<tr><td colspan="3">No items</td></tr>';var modal='<div class=\"modal-overlay open\" id=\"detailModal\"><div class=\"modal\" style=\"max-width:500px;\"><div class=\"modal-header\"><h3>Sale #'+s.id+'</h3><button class=\"modal-close\" onclick=\"document.getElementById(\'detailModal\').remove()\">&times;</button></div><div style=\"padding:12px;\">'+formatCurrency(s.total)+' - '+(s.payment_method||'Cash')+'<br><button class=\"btn btn-primary\" onclick=\"editSale('+s.id+')\">Edit</button></div></div></div>';document.body.insertAdjacentHTML('beforeend',modal);}
function editSale(id){showToast('Edit sale #'+id);}
document.addEventListener('DOMContentLoaded',loadDashboard);setInterval(loadDashboard,30000);
</script>
</body>
</html>
