<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Reconciliation - SHEDS POS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <script src="api.js"></script>
    <script src="common.js"></script>
    <style>
        .panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
        .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
        .form-group{display:flex;flex-direction:column;gap:6px}
        .form-group label{font-size:12px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.3px}
        .form-control{padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff}
        .btn{padding:10px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:800;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:.2s}
        .btn-primary{background:#10b981;color:#fff}
        .btn-outline{background:#fff;color:#111827;border:1px solid #d1d5db}
        .btn-danger{background:#ef4444;color:#fff}
        table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;font-size:14px}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
        th{background:#f8fafc;color:#334155;font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:800}
        tr:last-child td{border-bottom:none}
        .badge{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.2px}
        .badge-matched{background:#ecfdf5;color:#065f46}
        .badge-unmatched{background:#fffbeb;color:#92400e}
        .empty-state{text-align:center;color:#64748b;padding:36px 16px;font-size:14px}
    </style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
    <div class="header">
        <h2><i class="fas fa-building-columns"></i> Bank Reconciliation</h2>
        <div id="userMenu"></div>
        <div class="header-clock" id="topClock"></div>
    </div>
    <div class="content">
        <div class="panel">
            <h3><i class="fas fa-upload"></i> Upload / Record Bank Deposit</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="bankDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>Bank</label>
                    <select id="bankName" class="form-control">
                        <option value="GTBank">GTBank</option>
                        <option value="Zenith">Zenith</option>
                        <option value="Access">Access Bank</option>
                        <option value="First Bank">First Bank</option>
                        <option value="UBA">UBA</option>
                        <option value="Opay">Opay</option>
                        <option value="Paystack">Paystack</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount Deposited (₦)</label>
                    <input type="number" id="bankAmount" class="form-control" placeholder="0.00" step="0.01">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Reference / Txn ID</label>
                    <input type="text" id="bankRef" class="form-control" placeholder="Bank reference">
                </div>
                <div class="form-group">
                    <label>Note</label>
                    <input type="text" id="bankNote" class="form-control" placeholder="Optional note">
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveBankRecord()"><i class="fas fa-save"></i> Save</button>
        </div>
        <div class="panel">
            <h3><i class="fas fa-list"></i> Reconciliation Records</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Bank</th><th>Reference</th><th>Deposited</th><th>Expected POS</th><th>Variance</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="bankBody">
                        <tr><td colspan="8" class="empty-state">No records yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
var bankRecs=[];
function $(id){return document.getElementById(id);}
function esc(s){ return String(s||'').replace(/[&<>"']/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
function fmt(n){ return '₦' + (parseFloat(n)||0).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function showToast(m,err){ var t=$('toast'); t.textContent=m; t.className='toast'+(err?' error':''); t.style.display='block'; setTimeout(function(){t.style.display='none';},3000); }
function saveBankRecord(){
    var date=$('bankDate').value || new Date().toISOString().split('T')[0];
    var bank=$('bankName').value;
    var amount=parseFloat($('bankAmount').value)||0;
    var ref=$('bankRef').value.trim();
    var note=$('bankNote').value.trim();
    if(amount<=0){ showToast('Enter a valid deposit amount', true); return; }
    var expectedPos = expectedPOSFor(date, bank);
    var variance = amount - expectedPos;
    var record={ id:'BNK-'+Date.now(), date:date, bank:bank, amount:amount, ref:ref, note:note, expected:expectedPos, variance:variance, status: variance===0?'matched':'unmatched' };
    bankRecs.unshift(record);
    try{ localStorage.setItem('SHEDS_bank_recs', JSON.stringify(bankRecs)); }catch(e){}
    showToast('Record saved');
    renderBank();
    logAction('edit', record.id, 'Bank rec ' + bank + ' ' + fmt(amount));
}
function expectedPOSFor(date, bank){
    var sales=[];
    try{ sales=JSON.parse(localStorage.getItem('SHEDS_completed_sales')||localStorage.getItem('SHEDS_sales')||localStorage.getItem('sales')||'[]'); }catch(e){ sales=[]; }
    var total=0;
    sales.forEach(function(s){
        var d=s.date?POS.getDatePart(s.date):'';
        if(d===date && (s.payment_method==='bank_transfer' || s.payment_method==='pos' || s.payment_method===bank)) total+=(parseFloat(s.total)||0);
    });
    return total;
}
function badgeFor(s){ return s==='matched'?'<span class="badge badge-matched">Matched</span>':'<span class="badge badge-unmatched">Unmatched</span>'; }
function renderBank(){
    var tbody=$('bankBody');
    if(!bankRecs.length){ tbody.innerHTML='<tr><td colspan="8" class="empty-state">No records yet</td></tr>'; return; }
    tbody.innerHTML=bankRecs.map(function(b){
        return '<tr><td>'+esc(b.date)+'</td><td>'+esc(b.bank)+'</td><td>'+esc(b.ref||'-')+'</td><td style="font-weight:900;">'+fmt(b.amount)+'</td><td>'+fmt(b.expected)+'</td><td style="font-weight:900;color:'+(b.variance===0?'#10b981':'#ef4444')+'">'+fmt(b.variance)+'</td><td>'+badgeFor(b.status)+'</td><td><button class="btn btn-outline" style="padding:6px 10px;font-size:11px;" onclick="removeRec(\''+b.id+'\')"><i class="fas fa-trash"></i></button></td></tr>';
    }).join('');
}
function removeRec(id){ if(!confirm('Remove record?')) return; bankRecs=bankRecs.filter(function(b){return b.id!==id;}); try{ localStorage.setItem('SHEDS_bank_recs',JSON.stringify(bankRecs)); }catch(e){} renderBank(); showToast('Removed'); }
function loadBank(){ try{ bankRecs=JSON.parse(localStorage.getItem('SHEDS_bank_recs')||'[]'); if(!Array.isArray(bankRecs)) bankRecs=[]; }catch(e){ bankRecs=[]; } renderBank(); }
function logAction(action, ref, note){ var user=API.getUserName?API.getUserName():'System'; var entry={date:new Date().toISOString(),user:user,action:action,ref:ref,note:note}; try{ var existing=JSON.parse(localStorage.getItem('SHEDS_audit')||'[]'); existing.unshift(entry); localStorage.setItem('SHEDS_audit',JSON.stringify(existing.slice(0,1000))); }catch(e){} }
document.addEventListener('DOMContentLoaded', function(){ if(!POS.requireAuth()) return; $('bankDate').value=new Date().toISOString().split('T')[0]; loadBank(); });
</script>
</body>
</html>
