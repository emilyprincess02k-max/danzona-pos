<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - SHEDS POS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <script src="api.js"></script>
    <script src="common.js"></script>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
    <div class="header">
        <h2><i class="fas fa-envelope"></i> Messages</h2>
        <div id="userMenu"></div>
        <div class="header-clock" id="topClock"></div>
    </div>
    <div class="content">
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label"><i class="fas fa-envelope"></i> Total Messages</div>
                <div class="kpi-value" id="kpiTotal">0</div>
                <div class="kpi-sub">All messages</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label"><i class="fas fa-envelope-open"></i> Unread</div>
                <div class="kpi-value" style="color:#3b82f6;" id="kpiUnread">0</div>
                <div class="kpi-sub">New messages</div>
            </div>
        </div>
        <div class="page-head">
            <div>
                <h3>Message Center</h3>
                <p>View and send messages.</p>
            </div>
            <button class="btn btn-primary" onclick="showSendMessageForm()"><i class="fas fa-plus"></i> New Message</button>
        </div>
        <div class="panel">
            <div class="toolbar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search messages..." oninput="renderMessages()">
                <select id="statusFilter" class="form-select" onchange="renderMessages()">
                    <option value="all">All Status</option>
                    <option value="read">Read</option>
                    <option value="unread">Unread</option>
                </select>
            </div>
        </div>
        <div id="messageModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="messageModalTitle">New Message</h3>
                    <button class="modal-close" onclick="POS.closeModal('messageModal')">&times;</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">To</label>
                        <input type="text" id="messageTo" class="form-control" placeholder="Recipient">
                    </div>
                    <div class="form-group full">
                        <label class="required">Subject</label>
                        <input type="text" id="messageSubject" class="form-control" placeholder="Subject">
                    </div>
                    <div class="form-group full">
                        <label class="required">Message</label>
                        <textarea id="messageBody" class="form-control" placeholder="Type your message..." style="min-height:100px;"></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="POS.closeModal('messageModal')">Cancel</button>
                    <button class="btn btn-success" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
        <div class="table-panel">
            <div class="table-top"><strong><i class="fas fa-list"></i> Messages</strong><span id="msgCount">0 messages</span></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>From</th>
                            <th>Subject</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messagesTableBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
var messages = [];
var filteredMessages = [];
function $id(id) { return document.getElementById(id); }
function updateKPIs() {
    $id('kpiTotal').textContent = messages.length;
    $id('kpiUnread').textContent = messages.filter(function(m) { return m.status === 'unread'; }).length;
}
function showSendMessageForm() {
    $id('messageModal').classList.add('open');
    $id('messageModalTitle').textContent = 'New Message';
    $id('messageTo').value = '';
    $id('messageSubject').value = '';
    $id('messageBody').value = '';
}
async function sendMessage() {
    var to = $id('messageTo').value.trim();
    var subject = $id('messageSubject').value.trim();
    var body = $id('messageBody').value.trim();
    if (!to || !subject || !body) {
        POS.showToast('Please fill all fields', true);
        return;
    }
    try {
        var newId = messages.length > 0 ? Math.max.apply(null, messages.map(function(m) { return m.id; })) + 1 : 1;
        await API.saveMessage({ id: newId, from: API.getUserName() || 'Admin', to: to, subject: subject, body: body, date: POS.today(), status: 'read' });
        POS.showToast('Message sent!');
        POS.closeModal('messageModal');
        renderMessages();
    } catch (err) {
        POS.showToast(err.message || 'Failed to send message', true);
    }
}
function viewMessage(id) {
    var msg = messages.find(function(m) { return m.id == id; });
    if (!msg) return;
    var modalHtml = '<div class="modal-overlay open" id="viewMsgModal"><div class="modal" style="max-width:500px;"><div class="modal-header"><h3>' + POS.esc(msg.subject) + '</h3><button class="modal-close" onclick="POS.closeModal(\'viewMsgModal\')">&times;</button></div>' +
        '<div class="form-group" style="margin-bottom:10px;"><strong>From:</strong> ' + POS.esc(msg.from) + '</div>' +
        '<div class="form-group" style="margin-bottom:10px;"><strong>To:</strong> ' + POS.esc(msg.to) + '</div>' +
        '<div class="form-group" style="margin-bottom:10px;"><strong>Date:</strong> ' + POS.formatDate(msg.date) + '</div>' +
        '<hr style="margin:15px 0;"><p>' + POS.esc(msg.body).replace(/\n/g, '<br>') + '</p>' +
        '<div class="modal-actions"><button class="btn btn-secondary" onclick="POS.closeModal(\'viewMsgModal\')">Close</button></div></div></div>';
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}
async function deleteMessage(id) {
    if (!confirm('Delete this message?')) return;
    try {
        await API.deleteMessage(id);
        POS.showToast('Message deleted!');
        renderMessages();
    } catch (err) {
        POS.showToast(err.message || 'Delete failed', true);
    }
}
async function renderMessages() {
    try {
        messages = await API.getMessages() || [];
        filteredMessages = [...messages];
    } catch (err) {
        messages = [];
        POS.showToast('Failed to load messages', true);
    }
    updateKPIs();
    var q = $id('searchInput').value.toLowerCase();
    var st = $id('statusFilter').value;
    filteredMessages = messages.filter(function(m) {
        var text = [(m.from || ''), (m.to || ''), (m.subject || '')].join(' ').toLowerCase();
        var matchesSearch = !q || text.indexOf(q) > -1;
        var matchesStatus = st === 'all' || m.status === st;
        return matchesSearch && matchesStatus;
    });
    $id('msgCount').textContent = filteredMessages.length + ' messages';
    var tbody = $id('messagesTableBody');
    tbody.innerHTML = filteredMessages.map(function(m) {
        return '<tr><td>' + POS.esc(m.from || '') + '</td><td><strong>' + POS.esc(m.subject || '') + '</strong></td><td>' + POS.formatDate(m.date) + '</td><td>' + POS.statusBadge(m.status || 'read') + '</td><td class="action-btns"><button class="icon-btn view" onclick="viewMessage(' + m.id + ')"><i class="fas fa-eye"></i></button><button class="icon-btn delete" onclick="deleteMessage(' + m.id + ')"><i class="fas fa-trash"></i></button></td></tr>';
    }).join('') || '<tr><td colspan="5" class="empty-state">No messages found</td></tr>';
}
document.addEventListener('DOMContentLoaded', function() {
    if (!POS.requireAuth()) return;
    POS.renderSidebar();
    POS.renderUserMenu();
    renderMessages();
});
</script>
</body>
</html>
