services:
  - type: web
    name: danzona-pos
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/task/data/danzona_pos.db
    disk:
      name: data
      mountPath: /var/task/data
